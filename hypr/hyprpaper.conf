# Hyprpaper 0.8+ uses wallpaper blocks, not the old preload/wallpaper lines.
# Monitors from `hyprctl monitors`: HDMI-A-1 and HDMI-A-2.

splash = true
ipc = true

wallpaper {
  monitor = HDMI-A-1
  path = /home/sam/background-pictures/beach.jpg
  fit_mode = cover
}

wallpaper {
  monitor = HDMI-A-2
  path = /home/sam/background-pictures/cozy-view-beach-house.jpg
  fit_mode = cover
}
